<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Milk Data</title>
  <style>
    body {
      background-color: #eafaf1;
      font-family: sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    .upload-box {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: inline-block;
    }
    input[type="file"] {
      margin: 10px 0;
    }
    .btn {
      padding: 12px 25px;
      background-color: #58d68d;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #45b977;
    }
  </style>
</head>
<body>
  <div class="upload-box">
    <h2>Upload Milk Data CSV</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required><br>
      <button type="submit" class="btn">Next</button>
    </form>
  </div>
</body>
</html>
