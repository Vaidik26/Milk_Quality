<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Milk Quality Predictor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #cceae7;
      text-align: center;
    }

    .bg-image {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .btn-container {
      margin-top: -80px; /* Adjust based on image text */
    }

    .btn {
      padding: 14px 30px;
      background-color: #f5b041;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #e69520;
    }

    @media (max-width: 768px) {
      .btn-container {
        margin-top: -50px;
      }

      .btn {
        padding: 12px 24px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- Full natural size image, responsive -->
  <img src="/static/milk_bg_clean.png" alt="Milk Quality Background" class="bg-image">

  <!-- Button just under the image -->
  <div class="btn-container">
    <a href="/predict"><button class="btn">Get Started</button></a>
  </div>

</body>
</html>
