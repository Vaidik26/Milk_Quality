<!DOCTYPE html>
<html lang="en">
<head>

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url("{{ url_for('static', filename='milk_bg_clean.png') }}");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      align-items: center;

      flex-direction: column;

    .btn {

      text-decoration: none;
